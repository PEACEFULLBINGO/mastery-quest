<!DOCTYPE html>
<html lang="en">
<head> 
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🐉 ULTIMATE Game of Thrones Tracker 🐉</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      width: 100%;
      font-family: 'Georgia', serif;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed;
      transition: background-image 1s ease-in-out;
      color: #e8d4b8;
      overflow-x: hidden;
    }

    /* Animated background particles */
    @keyframes float {
      0%, 100% { transform: translateY(0px) rotate(0deg); opacity: 0.3; }
      50% { transform: translateY(-20px) rotate(180deg); opacity: 0.6; }
    }

    .particle {
      position: fixed;
      pointer-events: none;
      font-size: 2rem;
      animation: float 8s infinite;
      z-index: 1;
    }

    .container {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      align-items: center;
      padding: 40px 20px;
      position: relative;
      z-index: 2;
    }

    /* Title with enhanced animation */
    @keyframes titleGlow {
      0%, 100% { text-shadow: 0 0 20px rgba(255, 215, 0, 0.5), 0 0 40px rgba(220, 20, 60, 0.3); }
      50% { text-shadow: 0 0 30px rgba(255, 215, 0, 0.8), 0 0 60px rgba(220, 20, 60, 0.6); }
    }

    @keyframes slideDown {
      from { transform: translateY(-50px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    h1 {
      font-size: 3.5rem;
      margin-bottom: 10px;
      animation: slideDown 0.8s ease-out, titleGlow 3s ease-in-out infinite;
      text-align: center;
      color: #ffd700;
      text-transform: uppercase;
      letter-spacing: 3px;
      font-weight: bold;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
    }

    .subtitle {
      font-size: 1.1rem;
      margin-bottom: 40px;
      color: #dc143c;
      animation: slideDown 1s ease-out 0.2s both;
      letter-spacing: 2px;
    }

    /* Search section animation */
    @keyframes fadeInUp {
      from { transform: translateY(30px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    .input-section {
      animation: fadeInUp 0.8s ease-out 0.4s both;
      display: flex;
      gap: 15px;
      margin-bottom: 40px;
      flex-wrap: wrap;
      justify-content: center;
      max-width: 900px;
    }

    input, button {
      padding: 15px 20px;
      font-size: 1rem;
      border: 2px solid #ffd700;
      background: rgba(26, 31, 58, 0.9);
      color: #e8d4b8;
      border-radius: 8px;
      font-family: 'Georgia', serif;
      transition: all 0.3s ease;
      backdrop-filter: blur(10px);
    }

    input {
      flex: 1;
      min-width: 250px;
      max-width: 500px;
    }

    input::placeholder {
      color: #888;
    }

    input:focus {
      outline: none;
      border-color: #dc143c;
      background: rgba(26, 31, 58, 1);
      box-shadow: 0 0 20px rgba(220, 20, 60, 0.5);
      transform: scale(1.02);
    }

    button {
      background: linear-gradient(135deg, #ffd700, #ff8c00);
      color: #000;
      font-weight: bold;
      cursor: pointer;
      min-width: 140px;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    button:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 20px rgba(255, 215, 0, 0.5);
      letter-spacing: 1px;
    }

    button:active {
      transform: translateY(-1px);
    }

    /* Ripple effect on button */
    @keyframes ripple {
      to {
        transform: scale(4);
        opacity: 0;
      }
    }

    button::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 8px;
      height: 8px;
      background: rgba(255, 255, 255, 0.5);
      border-radius: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }

    button:active::after {
      animation: ripple 0.6s ease-out;
    }

    /* Search type selector */
    .search-type {
      animation: fadeInUp 0.8s ease-out 0.5s both;
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-bottom: 30px;
      flex-wrap: wrap;
    }

    .type-btn {
      padding: 10px 20px;
      background: rgba(220, 20, 60, 0.3);
      border: 2px solid #dc143c;
      color: #ffd700;
      cursor: pointer;
      border-radius: 20px;
      font-family: 'Georgia', serif;
      transition: all 0.3s ease;
      font-weight: bold;
    }

    .type-btn:hover {
      background: rgba(220, 20, 60, 0.6);
      transform: scale(1.05);
    }

    .type-btn.active {
      background: linear-gradient(135deg, #dc143c, #ff6347);
      box-shadow: 0 0 20px rgba(220, 20, 60, 0.8);
      transform: scale(1.1);
    }

    /* Browse section */
    .browse-section {
      animation: fadeInUp 0.8s ease-out 0.6s both;
      display: flex;
      gap: 15px;
      justify-content: center;
      margin-bottom: 40px;
      flex-wrap: wrap;
    }

    .browse-btn {
      padding: 12px 25px;
      background: rgba(255, 215, 0, 0.1);
      border: 2px solid #ffd700;
      color: #ffd700;
      cursor: pointer;
      border-radius: 8px;
      font-family: 'Georgia', serif;
      font-weight: bold;
      transition: all 0.3s ease;
    }

    .browse-btn:hover {
      background: rgba(255, 215, 0, 0.3);
      transform: translateY(-3px);
      box-shadow: 0 8px 15px rgba(255, 215, 0, 0.4);
    }

    /* Ask the Maester (AI) section */
    .maester-section {
      width: 100%;
      max-width: 900px;
      margin: 0 auto 40px;
      animation: fadeInUp 0.8s ease-out 0.65s both;
    }

    .maester-label {
      text-align: center;
      color: #ffd700;
      letter-spacing: 2px;
      font-size: 0.95rem;
      text-transform: uppercase;
      margin-bottom: 15px;
      opacity: 0.85;
    }

    .maester-input-row {
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 10px;
    }

    .maester-input-row input {
      flex: 1;
      min-width: 250px;
    }

    .maester-answer {
      margin-top: 20px;
      padding: 25px;
      background: linear-gradient(135deg, rgba(26, 31, 58, 0.95), rgba(40, 50, 80, 0.95));
      border: 2px solid #ffd700;
      border-radius: 12px;
      line-height: 1.7;
      animation: fadeInUp 0.5s ease-out;
    }

    .maester-answer-label {
      color: #ffd700;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-size: 0.85rem;
      margin-bottom: 8px;
    }

    .maester-answer-text {
      white-space: pre-wrap;
    }

    /* Results container */
    .results {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 25px;
      max-width: 1400px;
      width: 100%;
      animation: fadeInUp 0.8s ease-out 0.7s both;
    }

    .wiki-section {
      margin-top: 20px;
      padding-top: 20px;
      border-top: 2px solid #ffd700;
    }

    .wiki-input {
      width: 100%;
      padding: 12px;
      background: rgba(26, 31, 58, 0.9);
      border: 2px solid #ffd700;
      border-radius: 8px;
      color: #e8d4b8;
      font-family: 'Georgia', serif;
      margin-bottom: 15px;
    }

    .wiki-input:focus {
      outline: none;
      border-color: #dc143c;
      box-shadow: 0 0 15px rgba(220, 20, 60, 0.5);
    }

    .wiki-btn {
      background: linear-gradient(135deg, #dc143c, #ff6347);
      color: #ffd700;
      border: none;
      padding: 12px 25px;
      border-radius: 8px;
      cursor: pointer;
      font-family: 'Georgia', serif;
      font-weight: bold;
      font-size: 1rem;
      transition: all 0.3s ease;
      width: 100%;
    }

    .wiki-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(220, 20, 60, 0.6);
    }

    .wiki-link {
      display: inline-block;
      background: linear-gradient(135deg, #ffd700, #ff8c00);
      color: #000;
      padding: 12px 20px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: bold;
      margin-top: 10px;
      transition: all 0.3s ease;
    }

    .wiki-link:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(255, 215, 0, 0.6);
    }

    /* Modal styles */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.9);
      z-index: 1000;
      backdrop-filter: blur(5px);
    }

    .modal-content {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      max-width: 600px;
      width: 90%;
      max-height: 80vh;
      overflow-y: auto;
      background: linear-gradient(135deg, rgba(26, 31, 58, 0.95), rgba(40, 50, 80, 0.95));
      border: 3px solid #ffd700;
      border-radius: 15px;
      padding: 30px;
    }

    .close {
      position: absolute;
      right: 20px;
      top: 15px;
      color: #ffd700;
      font-size: 2rem;
      cursor: pointer;
      font-weight: bold;
    }

    .close:hover {
      color: #dc143c;
    }

    .detail-row {
      display: flex;
      margin-bottom: 15px;
      padding: 10px;
      background: rgba(255, 215, 0, 0.1);
      border-radius: 8px;
    }

    .detail-label {
      font-weight: bold;
      color: #ffd700;
      min-width: 80px;
    }

    .detail-value {
      color: #e8d4b8;
      flex: 1;
    }

    @keyframes cardSlideIn {
      from {
        transform: translateY(30px) rotateY(90deg);
        opacity: 0;
      }
      to {
        transform: translateY(0) rotateY(0deg);
        opacity: 1;
      }
    }

    .card {
      background: linear-gradient(135deg, rgba(26, 31, 58, 0.95), rgba(40, 50, 80, 0.95));
      border: 2px solid #ffd700;
      border-radius: 12px;
      padding: 25px;
      animation: cardSlideIn 0.6s ease-out forwards;
      transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      position: relative;
      overflow: hidden;
      backdrop-filter: blur(10px);
      cursor: pointer;
    }

    .card:nth-child(1) { animation-delay: 0.1s; }
    .card:nth-child(2) { animation-delay: 0.2s; }
    .card:nth-child(3) { animation-delay: 0.3s; }
    .card:nth-child(4) { animation-delay: 0.4s; }
    .card:nth-child(5) { animation-delay: 0.5s; }
    .card:nth-child(6) { animation-delay: 0.6s; }

    .card::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 215, 0, 0.2), transparent);
      transition: left 0.5s ease;
    }

    .card:hover::before {
      left: 100%;
    }

    .card:hover {
      transform: translateY(-15px) scale(1.05) rotateX(5deg);
      box-shadow: 0 20px 40px rgba(220, 20, 60, 0.6), 0 0 30px rgba(255, 215, 0, 0.3);
      border-color: #dc143c;
    }

    .card-title {
      font-size: 1.8rem;
      color: #ffd700;
      margin-bottom: 10px;
      text-transform: uppercase;
      letter-spacing: 1px;
      animation: slideDown 0.6s ease-out 0.2s both;
    }

    .card-subtitle {
      font-size: 1.1rem;
      color: #dc143c;
      margin-bottom: 15px;
      font-style: italic;
    }

    .card-info {
      font-size: 0.95rem;
      line-height: 1.8;
      color: #d95f2e;
    }

    .card-info p {
      margin-bottom: 8px;
      animation: fadeInUp 0.6s ease-out 0.3s both;
    }

    .status-badge {
      display: inline-block;
      padding: 5px 12px;
      border-radius: 20px;
      font-size: 0.85rem;
      font-weight: bold;
      margin-top: 10px;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }

    .alive {
      background: rgba(34, 177, 76, 0.3);
      border: 1px solid #22b14c;
      color: #22b14c;
    }

    .deceased {
      background: rgba(220, 20, 60, 0.3);
      border: 1px solid #dc143c;
      color: #dc143c;
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      animation: fadeInUp 0.8s ease-out;
    }

    .empty-state h2 {
      font-size: 2rem;
      color: #ffd700;
      margin-bottom: 20px;
    }

    .empty-state p {
      font-size: 1.1rem;
      color: #e8d4b8;
      margin-bottom: 20px;
    }

    .spinner {
      width: 50px;
      height: 50px;
      border: 4px solid rgba(255, 215, 0, 0.2);
      border-top: 4px solid #ffd700;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 40px auto;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    @media (max-width: 768px) {
      h1 { font-size: 2.5rem; letter-spacing: 1px; }
      .input-section { flex-direction: column; }
      input { min-width: auto; max-width: 100%; }
      button { min-width: 100%; }
      .results { grid-template-columns: 1fr; gap: 15px; }
      .card { padding: 20px; }
      .card-title { font-size: 1.5rem; }
    }

    @keyframes torch {
      0%, 100% { opacity: 0.8; filter: brightness(1); }
      50% { opacity: 1; filter: brightness(1.2); }
    }

    .torch {
      position: fixed;
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, rgba(255, 215, 0, 0.1) 0%, transparent 70%);
      border-radius: 50%;
      pointer-events: none;
      animation: torch 3s ease-in-out infinite;
      z-index: 0;
    }
  </style>
</head>

  function getHouseTheme(key) {
    return houseTheme[key] || houseTheme['default'];
  }

  function svgToDataUri(svg) {
    return 'data:image/svg+xml,' + encodeURIComponent(svg);
  }

  function generateAvatar(item) {
    const houseKey = item.house || item.ruler || item.name;
    const theme = getHouseTheme(houseKey);
    const initials = item.name.replace(/['']/g, '').split(' ').map(w => w[0]).filter(Boolean).slice(0, 2).join('').toUpperCase();
    const ringColor = item.status === 'alive' ? '#22b14c' : item.status === 'deceased' ? '#dc143c' : '#ffd700';
    const svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
      <defs>
        <radialGradient id="bg" cx="50%" cy="38%" r="75%">
          <stop offset="0%" stop-color="${theme.colors[0]}" stop-opacity="0.55"/>
          <stop offset="100%" stop-color="${theme.colors[0]}" stop-opacity="1"/>
        </radialGradient>
        <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="${theme.colors[1]}"/>
          <stop offset="100%" stop-color="${ringColor}"/>
        </linearGradient>
      </defs>
      <rect width="200" height="200" fill="${theme.colors[0]}"/>
      <circle cx="100" cy="100" r="90" fill="url(#bg)"/>
      <circle cx="100" cy="100" r="90" fill="none" stroke="url(#ring)" stroke-width="5"/>
      <circle cx="100" cy="100" r="78" fill="none" stroke="${theme.colors[1]}" stroke-width="1" opacity="0.5"/>
      <text x="100" y="92" font-size="58" text-anchor="middle" dominant-baseline="middle">${theme.sigil}</text>
      <text x="100" y="150" font-size="32" font-family="Georgia, serif" font-weight="bold" fill="${theme.colors[1]}" text-anchor="middle">${initials}</text>
    </svg>`;
    return svgToDataUri(svg);
  }

  function getImageSrc(item) {
    return customImageUrls[item.name] || item.image || generateAvatar(item);
  }

  let customBgUrls = JSON.parse(localStorage.getItem('customBgUrls')) || [];
  let allBackgrounds = [...images, ...customBgUrls];
  let currentIndex = 0;
  let timeLeft = 5;

  function changeBackground() {
    document.body.style.backgroundImage = `url(${allBackgrounds[currentIndex]})`;
    currentIndex = (currentIndex + 1) % allBackgrounds.length;
  }

  // Show a Game-of-Thrones-themed background immediately instead of waiting
  // for the first timer tick, so visitors never see an unrelated placeholder.
  changeBackground();

  function updateTimer() {
    timeLeft--;
    if (timeLeft < 0) {
      timeLeft = 5;
      changeBackground();
    }
  }

  setInterval(updateTimer, 1000);

  // Let the person paste in their own image to use in the background rotation
  // (e.g. a real screencap they found themselves). Saved in the browser.
  function addCustomBackground() {
    const url = prompt('Paste an image URL to add to the background rotation:');
    if (url && url.trim()) {
      customBgUrls.push(url.trim());
      localStorage.setItem('customBgUrls', JSON.stringify(customBgUrls));
      allBackgrounds = [...images, ...customBgUrls];
      document.body.style.backgroundImage = `url(${url.trim()})`;
      currentIndex = allBackgrounds.indexOf(url.trim());
      currentIndex = (currentIndex + 1) % allBackgrounds.length;
      timeLeft = 5;
    }
  }

  function resetBackgrounds() {
    customBgUrls = [];
    localStorage.removeItem('customBgUrls');
    allBackgrounds = [...images];
    currentIndex = 0;
    timeLeft = 5;
    changeBackground();
    alert('Custom backgrounds cleared — back to the defaults.');
  }

  // Ask the Maester: AI-powered Q&A about the series, using the Claude API
  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  async function askMaester() {
    const input = document.getElementById('maesterQuestion');
    const question = input.value.trim();
    if (!question) return;

    const answerBox = document.getElementById('maesterAnswer');
    answerBox.style.display = 'block';
    answerBox.innerHTML = `
      <div class="spinner" style="width:30px; height:30px; margin:0 auto 15px;"></div>
      <p style="text-align:center; color:#ffd700;">🐦 The raven flies to the Citadel...</p>
    `;

    try {
      const response = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-6",
          max_tokens: 1000,
          messages: [
            {
              role: "user",
              content: `You are a wise Maester of the Citadel, deeply learned in the lore of Game of Thrones / A Song of Ice and Fire — houses, characters, battles, history, and fan theories. Answer the following question in a warm, scholarly tone, in 3-6 sentences. If the question has nothing to do with Game of Thrones, gently say so and invite a question about the series instead.\n\nQuestion: ${question}`
            }
          ],
          tools: [{ type: "web_search_20250305", name: "web_search" }]
        })
      });

      if (!response.ok) throw new Error('Request failed: ' + response.status);

      const data = await response.json();
      const text = (data.content || [])
        .map(block => block.type === 'text' ? block.text : '')
        .filter(Boolean)
        .join('\n')
        .trim();

      answerBox.innerHTML = `
        <div class="maester-answer-label">🧙 The Maester answers</div>
        <div class="maester-answer-text">${escapeHtml(text) || 'The ravens were lost in a storm. Try asking again.'}</div>
      `;
    } catch (err) {
      console.error('Maester error:', err);
      answerBox.innerHTML = `
        <div class="maester-answer-label" style="color:#dc143c;">⚠️ The raven didn't make it</div>
        <div class="maester-answer-text">Something went wrong reaching the Citadel. Please try again.</div>
      `;
    }
  }

  // Search functions
  function setSearchType(type, btn) {
    currentSearchType = type;
    document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    displayResults([]);
  }

  function addTracker() {
    const query = document.getElementById('Trackertext').value.toLowerCase().trim();
    if (!query) return;

    let results = [];
    if (currentSearchType === 'all' || currentSearchType === 'character') {
      results = results.concat(database.characters.filter(item => 
        item.name.toLowerCase().includes(query) ||
        item.house.toLowerCase().includes(query) ||
        item.title.toLowerCase().includes(query) ||
        item.kingdom.toLowerCase().includes(query)
      ));
    }
    if (currentSearchType === 'all' || currentSearchType === 'house') {
      results = results.concat(database.houses.filter(item => 
        item.name.toLowerCase().includes(query)
      ));
    }
    displayResults(results);
  }

  function browseBatch(type) {
    let results = [];
    if (type === 'characters') results = database.characters.slice(0, 12);
    else if (type === 'houses') results = database.houses;
    else if (type === 'kingdoms') results = database.kingdoms;
    else if (type === 'battles') results = database.battles;
    
    displayResults(results);
  }

  function displayResults(items) {
    const resultsDiv = document.getElementById('results');
    if (items.length === 0) {
      resultsDiv.innerHTML = `
        <div class="empty-state">
          <h2>⚔️ No Results Found</h2>
          <p>Try searching for "Tyrion", "Stark", or browse all categories above.</p>
        </div>
      `;
      return;
    }

    resultsDiv.innerHTML = items.map((item, index) => {
      const statusClass = item.status ? item.status : '';
      const imgSrc = getImageSrc(item);
      return `
        <div class="card" style="animation-delay: ${0.1 * index}s" onclick="openModal(${JSON.stringify(item).replace(/"/g, '&quot;')})">
          <img src="${imgSrc}" alt="${item.name}" onerror="this.onerror=null;this.src='${generateAvatar(item)}'" style="width:100%; height:200px; object-fit:cover; border-radius:8px; margin-bottom:15px; border:2px solid #ffd700;">
          <div class="card-title">${item.name}</div>
          <div class="card-subtitle">${item.title || item.sigil || item.ruler}</div>
          <div class="card-info">
            <p>${item.house || item.kingdom || item.location}</p>
            <p>${item.info || item.description}</p>
            ${item.status ? `<span class="status-badge ${statusClass}">${item.status.toUpperCase()}</span>` : ''}
          </div>
        </div>
      `;
    }).join('');
  }

  // Modal functions
  function openModal(item) {
    const modal = document.getElementById('characterModal');
    const modalName = document.getElementById('modalCharacterName');
    const modalBody = document.getElementById('modalBody');
    
    modalName.textContent = item.name;
    const modalImgSrc = getImageSrc(item);
    modalBody.innerHTML = `
      <img src="${modalImgSrc}" alt="${item.name}" onerror="this.onerror=null;this.src='${generateAvatar(item)}'" style="width:100%; height:250px; object-fit:cover; border-radius:12px; margin-bottom:20px; border:2px solid #ffd700;">
      
      <div class="detail-row">
        <span class="detail-label">Title:</span>
        <span class="detail-value">${item.title || 'N/A'}</span>
      </div>
      
      <div class="detail-row">
        <span class="detail-label">House:</span>
        <span class="detail-value">${item.house || 'N/A'}</span>
      </div>
      
      <div class="detail-row">
        <span class="detail-label">Kingdom:</span>
        <span class="detail-value">${item.kingdom || item.location || 'N/A'}</span>
      </div>
      
      ${item.status ? `
      <div class="detail-row">
        <span class="detail-label">Status:</span>
        <span class="detail-value">
          <span class="status-badge ${item.status}">${item.status.toUpperCase()}</span>
        </span>
      </div>` : ''}
      
      <div class="detail-row">
        <span class="detail-label">Info:</span>
        <span class="detail-value">${item.info || item.description || 'N/A'}</span>
      </div>
      
      <div class="detail-row">
        <span class="detail-label">Fate:</span>
        <span class="detail-value">${item.details || 'N/A'}</span>
      </div>
      
      <div class="wiki-section">
        <input type="text" class="wiki-input" id="customImageInput" placeholder="Paste an image URL for ${item.name} (optional)" value="${customImageUrls[item.name] || ''}">
        <button class="wiki-btn" onclick="saveCustomImage('${item.name}')">🖼️ Use This Image</button>
        ${customImageUrls[item.name] ? `<button class="wiki-btn" style="margin-top:10px; background:linear-gradient(135deg,#555,#333); color:#e8d4b8;" onclick="clearCustomImage('${item.name}')">↩️ Reset to Default</button>` : ''}
      </div>

      <div class="wiki-section">
        <input type="text" class="wiki-input" id="wikiUrlInput" placeholder="Enter Wiki URL (optional)" value="${wikiUrls[item.name] || ''}">
        <button class="wiki-btn" onclick="saveWikiUrl('${item.name}')">Save Wiki URL</button>
        ${wikiUrls[item.name] ? `<a href="${wikiUrls[item.name]}" target="_blank" class="wiki-link">🌐 Open Wiki</a>` : ''}
      </div>
    `;
    
    modal.style.display = 'block';
  }

  function closeModal() {
    document.getElementById('characterModal').style.display = 'none';
  }

  function saveWikiUrl(name) {
    const url = document.getElementById('wikiUrlInput').value.trim();
    if (url) {
      wikiUrls[name] = url;
      localStorage.setItem('wikiUrls', JSON.stringify(wikiUrls));
      closeModal();
      setTimeout(() => alert('Wiki URL saved!'), 100);
    }
  }

  function saveCustomImage(name) {
    const url = document.getElementById('customImageInput').value.trim();
    if (url) {
      customImageUrls[name] = url;
      localStorage.setItem('customImageUrls', JSON.stringify(customImageUrls));
      closeModal();
      setTimeout(() => alert('Image saved! It will show up on the card from now on.'), 100);
    }
  }

  function clearCustomImage(name) {
    delete customImageUrls[name];
    localStorage.setItem('customImageUrls', JSON.stringify(customImageUrls));
    closeModal();
  }

  // Close modal when clicking outside
  window.onclick = function(event) {
    const modal = document.getElementById('characterModal');
    if (event.target === modal) {
      closeModal();
    }
  }

  // Initialize
  displayResults([]);
</script>

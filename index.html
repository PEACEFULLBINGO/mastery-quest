
<!DOCTYPE html>
<html lang="en">
<head> 
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🐉 ULTIMATE Game of Thrones Tracker 🐉</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      width: 100%;
      font-family: 'Georgia', serif;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed;
      transition: background-image 1s ease-in-out;
      color: #e8d4b8;
      overflow-x: hidden;
    }

    /* Animated background particles */
    @keyframes float {
      0%, 100% { transform: translateY(0px) rotate(0deg); opacity: 0.3; }
      50% { transform: translateY(-20px) rotate(180deg); opacity: 0.6; }
    }

    .particle {
      position: fixed;
      pointer-events: none;
      font-size: 2rem;
      animation: float 8s infinite;
      z-index: 1;
    }

    .container {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      align-items: center;
      padding: 40px 20px;
      position: relative;
      z-index: 2;
    }

    /* Title with enhanced animation */
    @keyframes titleGlow {
      0%, 100% { text-shadow: 0 0 20px rgba(255, 215, 0, 0.5), 0 0 40px rgba(220, 20, 60, 0.3); }
      50% { text-shadow: 0 0 30px rgba(255, 215, 0, 0.8), 0 0 60px rgba(220, 20, 60, 0.6); }
    }

    @keyframes slideDown {
      from { transform: translateY(-50px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    h1 {
      font-size: 3.5rem;
      margin-bottom: 10px;
      animation: slideDown 0.8s ease-out, titleGlow 3s ease-in-out infinite;
      text-align: center;
      color: #ffd700;
      text-transform: uppercase;
      letter-spacing: 3px;
      font-weight: bold;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
    }

    .subtitle {
      font-size: 1.1rem;
      margin-bottom: 40px;
      color: #dc143c;
      animation: slideDown 1s ease-out 0.2s both;
      letter-spacing: 2px;
    }

    /* Search section animation */
    @keyframes fadeInUp {
      from { transform: translateY(30px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    .input-section {
      animation: fadeInUp 0.8s ease-out 0.4s both;
      display: flex;
      gap: 15px;
      margin-bottom: 40px;
      flex-wrap: wrap;
      justify-content: center;
      max-width: 900px;
    }

    input, button {
      padding: 15px 20px;
      font-size: 1rem;
      border: 2px solid #ffd700;
      background: rgba(26, 31, 58, 0.9);
      color: #e8d4b8;
      border-radius: 8px;
      font-family: 'Georgia', serif;
      transition: all 0.3s ease;
      backdrop-filter: blur(10px);
    }

    input {
      flex: 1;
      min-width: 250px;
      max-width: 500px;
    }

    input::placeholder {
      color: #888;
    }

    input:focus {
      outline: none;
      border-color: #dc143c;
      background: rgba(26, 31, 58, 1);
      box-shadow: 0 0 20px rgba(220, 20, 60, 0.5);
      transform: scale(1.02);
    }

    button {
      background: linear-gradient(135deg, #ffd700, #ff8c00);
      color: #000;
      font-weight: bold;
      cursor: pointer;
      min-width: 140px;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    button:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 20px rgba(255, 215, 0, 0.5);
      letter-spacing: 1px;
    }

    button:active {
      transform: translateY(-1px);
    }

    /* Ripple effect on button */
    @keyframes ripple {
      to {
        transform: scale(4);
        opacity: 0;
      }
    }

    button::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 8px;
      height: 8px;
      background: rgba(255, 255, 255, 0.5);
      border-radius: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }

    button:active::after {
      animation: ripple 0.6s ease-out;
    }

    /* Search type selector */
    .search-type {
      animation: fadeInUp 0.8s ease-out 0.5s both;
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-bottom: 30px;
      flex-wrap: wrap;
    }

    .type-btn {
      padding: 10px 20px;
      background: rgba(220, 20, 60, 0.3);
      border: 2px solid #dc143c;
      color: #ffd700;
      cursor: pointer;
      border-radius: 20px;
      font-family: 'Georgia', serif;
      transition: all 0.3s ease;
      font-weight: bold;
    }

    .type-btn:hover {
      background: rgba(220, 20, 60, 0.6);
      transform: scale(1.05);
    }

    .type-btn.active {
      background: linear-gradient(135deg, #dc143c, #ff6347);
      box-shadow: 0 0 20px rgba(220, 20, 60, 0.8);
      transform: scale(1.1);
    }

    /* Browse section */
    .browse-section {
      animation: fadeInUp 0.8s ease-out 0.6s both;
      display: flex;
      gap: 15px;
      justify-content: center;
      margin-bottom: 40px;
      flex-wrap: wrap;
    }

    .browse-btn {
      padding: 12px 25px;
      background: rgba(255, 215, 0, 0.1);
      border: 2px solid #ffd700;
      color: #ffd700;
      cursor: pointer;
      border-radius: 8px;
      font-family: 'Georgia', serif;
      font-weight: bold;
      transition: all 0.3s ease;
    }

    .browse-btn:hover {
      background: rgba(255, 215, 0, 0.3);
      transform: translateY(-3px);
      box-shadow: 0 8px 15px rgba(255, 215, 0, 0.4);
    }

    /* Results container */
    .results {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 25px;
      max-width: 1400px;
      width: 100%;
      animation: fadeInUp 0.8s ease-out 0.7s both;
    }

    .wiki-section {
      margin-top: 20px;
      padding-top: 20px;
      border-top: 2px solid #ffd700;
    }

    .wiki-input {
      width: 100%;
      padding: 12px;
      background: rgba(26, 31, 58, 0.9);
      border: 2px solid #ffd700;
      border-radius: 8px;
      color: #e8d4b8;
      font-family: 'Georgia', serif;
      margin-bottom: 15px;
    }

    .wiki-input:focus {
      outline: none;
      border-color: #dc143c;
      box-shadow: 0 0 15px rgba(220, 20, 60, 0.5);
    }

    .wiki-btn {
      background: linear-gradient(135deg, #dc143c, #ff6347);
      color: #ffd700;
      border: none;
      padding: 12px 25px;
      border-radius: 8px;
      cursor: pointer;
      font-family: 'Georgia', serif;
      font-weight: bold;
      font-size: 1rem;
      transition: all 0.3s ease;
      width: 100%;
    }

    .wiki-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(220, 20, 60, 0.6);
    }

    .wiki-link {
      display: inline-block;
      background: linear-gradient(135deg, #ffd700, #ff8c00);
      color: #000;
      padding: 12px 20px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: bold;
      margin-top: 10px;
      transition: all 0.3s ease;
    }

    .wiki-link:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(255, 215, 0, 0.6);
    }

    /* Modal styles */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.9);
      z-index: 1000;
      backdrop-filter: blur(5px);
    }

    .modal-content {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      max-width: 600px;
      width: 90%;
      max-height: 80vh;
      overflow-y: auto;
      background: linear-gradient(135deg, rgba(26, 31, 58, 0.95), rgba(40, 50, 80, 0.95));
      border: 3px solid #ffd700;
      border-radius: 15px;
      padding: 30px;
    }

    .close {
      position: absolute;
      right: 20px;
      top: 15px;
      color: #ffd700;
      font-size: 2rem;
      cursor: pointer;
      font-weight: bold;
    }

    .close:hover {
      color: #dc143c;
    }

    .detail-row {
      display: flex;
      margin-bottom: 15px;
      padding: 10px;
      background: rgba(255, 215, 0, 0.1);
      border-radius: 8px;
    }

    .detail-label {
      font-weight: bold;
      color: #ffd700;
      min-width: 80px;
    }

    .detail-value {
      color: #e8d4b8;
      flex: 1;
    }

    @keyframes cardSlideIn {
      from {
        transform: translateY(30px) rotateY(90deg);
        opacity: 0;
      }
      to {
        transform: translateY(0) rotateY(0deg);
        opacity: 1;
      }
    }

    .card {
      background: linear-gradient(135deg, rgba(26, 31, 58, 0.95), rgba(40, 50, 80, 0.95));
      border: 2px solid #ffd700;
      border-radius: 12px;
      padding: 25px;
      animation: cardSlideIn 0.6s ease-out forwards;
      transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      position: relative;
      overflow: hidden;
      backdrop-filter: blur(10px);
      cursor: pointer;
    }

    .card:nth-child(1) { animation-delay: 0.1s; }
    .card:nth-child(2) { animation-delay: 0.2s; }
    .card:nth-child(3) { animation-delay: 0.3s; }
    .card:nth-child(4) { animation-delay: 0.4s; }
    .card:nth-child(5) { animation-delay: 0.5s; }
    .card:nth-child(6) { animation-delay: 0.6s; }

    .card::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 215, 0, 0.2), transparent);
      transition: left 0.5s ease;
    }

    .card:hover::before {
      left: 100%;
    }

    .card:hover {
      transform: translateY(-15px) scale(1.05) rotateX(5deg);
      box-shadow: 0 20px 40px rgba(220, 20, 60, 0.6), 0 0 30px rgba(255, 215, 0, 0.3);
      border-color: #dc143c;
    }

    .card-title {
      font-size: 1.8rem;
      color: #ffd700;
      margin-bottom: 10px;
      text-transform: uppercase;
      letter-spacing: 1px;
      animation: slideDown 0.6s ease-out 0.2s both;
    }

    .card-subtitle {
      font-size: 1.1rem;
      color: #dc143c;
      margin-bottom: 15px;
      font-style: italic;
    }

    .card-info {
      font-size: 0.95rem;
      line-height: 1.8;
      color: #d95f2e;
    }

    .card-info p {
      margin-bottom: 8px;
      animation: fadeInUp 0.6s ease-out 0.3s both;
    }

    .status-badge {
      display: inline-block;
      padding: 5px 12px;
      border-radius: 20px;
      font-size: 0.85rem;
      font-weight: bold;
      margin-top: 10px;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }

    .alive {
      background: rgba(34, 177, 76, 0.3);
      border: 1px solid #22b14c;
      color: #22b14c;
    }

    .deceased {
      background: rgba(220, 20, 60, 0.3);
      border: 1px solid #dc143c;
      color: #dc143c;
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      animation: fadeInUp 0.8s ease-out;
    }

    .empty-state h2 {
      font-size: 2rem;
      color: #ffd700;
      margin-bottom: 20px;
    }

    .empty-state p {
      font-size: 1.1rem;
      color: #e8d4b8;
      margin-bottom: 20px;
    }

    .spinner {
      width: 50px;
      height: 50px;
      border: 4px solid rgba(255, 215, 0, 0.2);
      border-top: 4px solid #ffd700;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 40px auto;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    @media (max-width: 768px) {
      h1 { font-size: 2.5rem; letter-spacing: 1px; }
      .input-section { flex-direction: column; }
      input { min-width: auto; max-width: 100%; }
      button { min-width: 100%; }
      .results { grid-template-columns: 1fr; gap: 15px; }
      .card { padding: 20px; }
      .card-title { font-size: 1.5rem; }
    }

    @keyframes torch {
      0%, 100% { opacity: 0.8; filter: brightness(1); }
      50% { opacity: 1; filter: brightness(1.2); }
    }

    .torch {
      position: fixed;
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, rgba(255, 215, 0, 0.1) 0%, transparent 70%);
      border-radius: 50%;
      pointer-events: none;
      animation: torch 3s ease-in-out infinite;
      z-index: 0;
    }
  </style>
</head>

    'https://static.wikia.nocookie.net/gameofthrones/images/1/1a/Ned%27s_execution.jpg/revision/latest/scale-to-width-down/1000?cb=20160730054118', 
    'https://imgs.search.brave.com/hl8N59D70tvzzPqGqvMMJGPI-UAfllfz505Pcq-S9y0/rs:fit:500:0:1:0/g:ce/aHR0cHM6Ly93MC5w/ZWFrcHguY29tL3dh/bGxwYXBlci8yNjUv/Nzg1L0hELXdhbGxw/YXBlci1nYW1lLW9m/LXRocm9uZXMtZGFl/bmVyeXMtdGFyZ2Fy/eWVuLWZhbnRhc3kt/Z2lybC1kcmFnb24t/Y3JlYXR1cmUtYmxv/bmRlLXRodW1ibmFp/bC5qcGc',
    'https://picsum.photos/1920/1080?random=4',
    'https://picsum.photos/1920/1080?random=5'
  ];
  let currentIndex = 0;
  let timeLeft = 5;

  function changeBackground() {
    document.body.style.backgroundImage = `url(${images[currentIndex]})`;
    currentIndex = (currentIndex + 1) % images.length;
  }

  function updateTimer() {
    timeLeft--;
    if (timeLeft < 0) {
      timeLeft = 5;
      changeBackground();
    }
  }

  setInterval(updateTimer, 1000);

  // Search functions
  function setSearchType(type, btn) {
    currentSearchType = type;
    document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    displayResults([]);
  }

  function addTracker() {
    const query = document.getElementById('Trackertext').value.toLowerCase().trim();
    if (!query) return;

    let results = [];
    if (currentSearchType === 'all' || currentSearchType === 'character') {
      results = results.concat(database.characters.filter(item => 
        item.name.toLowerCase().includes(query) ||
        item.house.toLowerCase().includes(query) ||
        item.title.toLowerCase().includes(query) ||
        item.kingdom.toLowerCase().includes(query)
      ));
    }
    if (currentSearchType === 'all' || currentSearchType === 'house') {
      results = results.concat(database.houses.filter(item => 
        item.name.toLowerCase().includes(query)
      ));
    }
    displayResults(results);
  }

  function browseBatch(type) {
    let results = [];
    if (type === 'characters') results = database.characters.slice(0, 12);
    else if (type === 'houses') results = database.houses;
    else if (type === 'kingdoms') results = database.kingdoms;
    else if (type === 'battles') results = database.battles;
    
    displayResults(results);
  }

  function displayResults(items) {
    const resultsDiv = document.getElementById('results');
    if (items.length === 0) {
      resultsDiv.innerHTML = `
        <div class="empty-state">
          <h2>⚔️ No Results Found</h2>
          <p>Try searching for "Tyrion", "Stark", or browse all categories above.</p>
        </div>
      `;
      return;
    }

    resultsDiv.innerHTML = items.map((item, index) => {
      const statusClass = item.status ? item.status : '';
      return `
        <div class="card" style="animation-delay: ${0.1 * index}s" onclick="openModal(${JSON.stringify(item).replace(/"/g, '&quot;')})">
          ${item.image ? `<img src="${item.image}" alt="${item.name}" onerror="this.style.display='none'" style="width:100%; height:200px; object-fit:cover; border-radius:8px; margin-bottom:15px; border:2px solid #ffd700;">` : ''}
          <div class="card-title">${item.name}</div>
          <div class="card-subtitle">${item.title || item.sigil || item.ruler}</div>
          <div class="card-info">
            <p>${item.house || item.kingdom || item.location}</p>
            <p>${item.info || item.description}</p>
            ${item.status ? `<span class="status-badge ${statusClass}">${item.status.toUpperCase()}</span>` : ''}
          </div>
        </div>
      `;
    }).join('');
  }

  // Modal functions
  function openModal(item) {
    const modal = document.getElementById('characterModal');
    const modalName = document.getElementById('modalCharacterName');
    const modalBody = document.getElementById('modalBody');
    
    modalName.textContent = item.name;
    modalBody.innerHTML = `
      ${item.image ? `<img src="${item.image}" alt="${item.name}" onerror="this.style.display='none'" style="width:100%; height:250px; object-fit:cover; border-radius:12px; margin-bottom:20px; border:2px solid #ffd700;">` : ''}
      
      <div class="detail-row">
        <span class="detail-label">Title:</span>
        <span class="detail-value">${item.title || 'N/A'}</span>
      </div>
      
      <div class="detail-row">
        <span class="detail-label">House:</span>
        <span class="detail-value">${item.house || 'N/A'}</span>
      </div>
      
      <div class="detail-row">
        <span class="detail-label">Kingdom:</span>
        <span class="detail-value">${item.kingdom || item.location || 'N/A'}</span>
      </div>
      
      ${item.status ? `
      <div class="detail-row">
        <span class="detail-label">Status:</span>
        <span class="detail-value">
          <span class="status-badge ${item.status}">${item.status.toUpperCase()}</span>
        </span>
      </div>` : ''}
      
      <div class="detail-row">
        <span class="detail-label">Info:</span>
        <span class="detail-value">${item.info || item.description || 'N/A'}</span>
      </div>
      
      <div class="detail-row">
        <span class="detail-label">Fate:</span>
        <span class="detail-value">${item.details || 'N/A'}</span>
      </div>
      
      <div class="wiki-section">
        <input type="text" class="wiki-input" id="wikiUrlInput" placeholder="Enter Wiki URL (optional)" value="${wikiUrls[item.name] || ''}">
        <button class="wiki-btn" onclick="saveWikiUrl('${item.name}')">Save Wiki URL</button>
        ${wikiUrls[item.name] ? `<a href="${wikiUrls[item.name]}" target="_blank" class="wiki-link">🌐 Open Wiki</a>` : ''}
      </div>
    `;
    
    modal.style.display = 'block';
  }

  function closeModal() {
    document.getElementById('characterModal').style.display = 'none';
  }

  function saveWikiUrl(name) {
    const url = document.getElementById('wikiUrlInput').value.trim();
    if (url) {
      wikiUrls[name] = url;
      localStorage.setItem('wikiUrls', JSON.stringify(wikiUrls));
      closeModal();
      setTimeout(() => alert('Wiki URL saved!'), 100);
    }
  }

  // Close modal when clicking outside
  window.onclick = function(event) {
    const modal = document.getElementById('characterModal');
    if (event.target === modal) {
      closeModal();
    }
  }

  // Initialize
  displayResults([]);
</script>
